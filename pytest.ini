[pytest]
addopts = -ra --strict-markers
testpaths = tests
markers =
    unit: fast tests for isolated functions/classes
    property: property-based tests with bounded examples
    interpreter: Rust concrete interpreter semantics
    symbolic: symbolic and concolic execution behavior or disabled-contract tests
    native: requires the Rust/PyO3 native interpreter module
    differential: compares independent engines or oracles
    integration: exercises multiple subsystems together
    benchmark: requires compiled benchmark packages or external benchmark assets
    slow: intentionally slow tests, skipped by default
    exhaustive: high-intensity tests for nightly/deep validation, skipped by default
    requires_compiled_package: requires test_packages/*_pkg artifacts
