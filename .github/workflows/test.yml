name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest lark

      - name: Run unit tests
        run: |
          python -m pytest tests/test_interpreter.py -q --tb=short -k "not (EndToEnd or BenchmarkInputs)"

      - name: Run expression op tests
        run: |
          python -m pytest tests/test_expression_ops.py -q --tb=short

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build native interpreter
        working-directory: interpreter/native
        run: maturin build --release
