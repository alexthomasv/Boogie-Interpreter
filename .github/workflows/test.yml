name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest lark

      # Build a workspace that mirrors the parent repo layout:
      #   workspace/
      #     interpreter/   <- this repo
      #     parser/        <- from parent repo
      #     utils/         <- from parent repo
      - name: Create workspace
        run: mkdir -p workspace

      - name: Checkout interpreter
        uses: actions/checkout@v4
        with:
          path: workspace/interpreter

      - name: Clone parent repo for parser/ and utils/
        run: |
          git clone --depth 1 https://github.com/alexthomasv/boogie-parser.git /tmp/boogie-parser
          cp -r /tmp/boogie-parser/parser workspace/parser
          cp -r /tmp/boogie-parser/utils workspace/utils

      - name: Run unit tests
        working-directory: workspace
        run: |
          python -m pytest interpreter/tests/test_interpreter.py -q --tb=short -k "not (EndToEnd or BenchmarkInputs)"

      - name: Run expression op tests
        working-directory: workspace
        run: |
          python -m pytest interpreter/tests/test_expression_ops.py -q --tb=short

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build native interpreter
        working-directory: native
        run: maturin build --release
