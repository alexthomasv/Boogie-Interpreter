name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      # The interpreter depends on parser/ and utils/ from the parent repo.
      # Clone the parent repo to provide these dependencies.
      - name: Clone parent repo for dependencies
        run: |
          git clone --depth 1 https://github.com/alexthomasv/boogie-parser.git /tmp/boogie-parser
          # Symlink parser and utils into the working directory's parent
          # so `from parser.* import` and `from utils.* import` resolve
          ln -s /tmp/boogie-parser/parser ../parser
          ln -s /tmp/boogie-parser/utils ../utils

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest lark

      - name: Run unit tests
        working-directory: ..
        run: |
          python -m pytest interpreter/tests/test_interpreter.py -q --tb=short -k "not (EndToEnd or BenchmarkInputs)"

      - name: Run expression op tests
        working-directory: ..
        run: |
          python -m pytest interpreter/tests/test_expression_ops.py -q --tb=short

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build native interpreter
        working-directory: native
        run: maturin build --release
